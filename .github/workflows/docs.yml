name: build-docs

on:
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build documentation
        run: |
          pdoc -o docs \
            app.py \
            utils.py \
            chunking/chunker.py \
            evaluate/test_queries.py \
            ingest/pubmed_fetcher.py \
            rag/pipeline.py \
            rag/prompts.py \
            vectordb/embeddings.py \
            vectordb/store.py
